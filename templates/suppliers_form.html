{% extends "base.html" %}
{% block title %}Supplier • SiteManager360{% endblock %}
{% block content %}
<h1>{{ 'Edit' if item else 'New' }} Supplier</h1>
<form method="post" class="form">
  <label>Name
  <input type="text" name="name" value="{{ item.name if item else '' }}" required>
</label><label>Phone
  <input type="text" name="phone" value="{{ item.phone if item else '' }}" required>
</label><label>Email
  <input type="text" name="email" value="{{ item.email if item else '' }}" required>
</label><label>Category
  <input type="text" name="category" value="{{ item.category if item else '' }}" required>
</label>
  <div class="form-actions">
    <button class="btn" type="submit">Save</button>
    <a class="btn secondary" href="{{ url_for('suppliers') }}">Cancel</a>
  </div>
</form>
{% endblock %}
