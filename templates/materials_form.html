{% extends "base.html" %}
{% block title %}Material • SiteManager360{% endblock %}
{% block content %}
<h1>{{ 'Edit' if item else 'New' }} Material</h1>
<form method="post" class="form">
  <label>Name
  <input type="text" name="name" value="{{ item.name if item else '' }}" required>
</label><label>Supplier
  <select name="supplier_id">
    <option value="">-- None --</option>
    {% for opt in suppliers %}<option value="{{ opt.id }}" {% if item and item.supplier_id==opt.id %}selected{% endif %}>{{ opt.name }}</option>{% endfor %}
  </select>
</label><label>Unit
  <input type="text" name="unit" value="{{ item.unit if item else '' }}" required>
</label><label>Current Stock
  <input type="number" step="0.01" name="current_stock" value="{{ item.current_stock if item else '0' }}">
</label><label>Reorder Level
  <input type="number" step="0.01" name="reorder_level" value="{{ item.reorder_level if item else '' }}">
</label><label>Cost / Unit
  <input type="number" step="0.01" name="cost_per_unit" value="{{ item.cost_per_unit if item else '' }}">
</label>
  <div class="form-actions">
    <button class="btn" type="submit">Save</button>
    <a class="btn secondary" href="{{ url_for('materials') }}">Cancel</a>
  </div>
</form>
{% endblock %}
