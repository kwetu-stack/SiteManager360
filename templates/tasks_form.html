{% extends "base.html" %}
{% block title %}Task • SiteManager360{% endblock %}
{% block content %}
<h1>{{ 'Edit' if item else 'New' }} Task</h1>
<form method="post" class="form">
  <label>Task Name
  <input type="text" name="name" value="{{ item.name if item else '' }}" required>
</label><label>Site
  <select name="site_id" required>
    {% for opt in sites %}
      <option value="{{ opt.id }}" {% if item and item.site_id==opt.id %}selected{% endif %}>{{ opt.name }}</option>
    {% endfor %}
  </select>
</label><label>Assigned To (optional)
  <select name="assigned_to">
    <option value="">-- None --</option>
    {% for opt in workers %}
      <option value="{{ opt.id }}" {% if item and item.assigned_to==opt.id %}selected{% endif %}>{{ opt.name }}</option>
    {% endfor %}
  </select>
</label><label>Status
  <select name="status" required>
    <option value="Pending" {% if item and item.status=='Pending' %}selected{% endif %}>Pending</option>
    <option value="In Progress" {% if item and item.status=='In Progress' %}selected{% endif %}>In Progress</option>
    <option value="Completed" {% if item and item.status=='Completed' %}selected{% endif %}>Completed</option>
  </select>
</label><label>Start Date
  <input type="date" name="start_date" value="{{ item.start_date.strftime('%Y-%m-%d') if item and item.start_date else '' }}">
</label><label>End Date
  <input type="date" name="end_date" value="{{ item.end_date.strftime('%Y-%m-%d') if item and item.end_date else '' }}">
</label>
  <div class="form-actions">
    <button class="btn" type="submit">Save</button>
    <a class="btn secondary" href="{{ url_for('tasks') }}">Cancel</a>
  </div>
</form>
{% endblock %}
