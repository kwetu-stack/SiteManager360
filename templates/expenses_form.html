{% extends "base.html" %}
{% block title %}Expense • SiteManager360{% endblock %}
{% block content %}
<h1>{{ 'Edit' if item else 'New' }} Expense</h1>
<form method="post" class="form">
  <label>Site
  <select name="site_id">
    
    {% for opt in sites %}<option value="{{ opt.id }}" {% if item and item.site_id==opt.id %}selected{% endif %}>{{ opt.name }}</option>{% endfor %}
  </select>
</label><label>Category
  <input type="text" name="category" value="{{ item.category if item else '' }}" required>
</label><label>Amount
  <input type="number" step="0.01" name="amount" value="{{ item.amount if item else '' }}">
</label><label>Supplier (optional)
  <select name="supplier_id">
    <option value="">-- None --</option>
    {% for opt in suppliers %}<option value="{{ opt.id }}" {% if item and item.supplier_id==opt.id %}selected{% endif %}>{{ opt.name }}</option>{% endfor %}
  </select>
</label><label>Date
  <input type="date" name="date" value="{{ item.date.strftime('%Y-%m-%d') if item and item.date else '' }}">
</label><label>Note
  <input type="text" name="note" value="{{ item.note if item else '' }}" required>
</label>
  <div class="form-actions">
    <button class="btn" type="submit">Save</button>
    <a class="btn secondary" href="{{ url_for('expenses') }}">Cancel</a>
  </div>
</form>
{% endblock %}
