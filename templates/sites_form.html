{% extends "base.html" %}
{% block title %}Site • SiteManager360{% endblock %}
{% block content %}
<h1>{{ 'Edit' if item else 'New' }} Site</h1>
<form method="post" class="form">
  <label>Name
  <input type="text" name="name" value="{{ item.name if item else '' }}" required>
</label><label>Project
  <select name="project_id">
    
    {% for opt in projects %}<option value="{{ opt.id }}" {% if item and item.project_id==opt.id %}selected{% endif %}>{{ opt.name }}</option>{% endfor %}
  </select>
</label><label>Location
  <input type="text" name="location" value="{{ item.location if item else '' }}" required>
</label><label>Manager (optional)
  <select name="manager_id">
    <option value="">-- None --</option>
    {% for opt in workers %}<option value="{{ opt.id }}" {% if item and item.manager_id==opt.id %}selected{% endif %}>{{ opt.name }}</option>{% endfor %}
  </select>
</label><label>Start Date
  <input type="date" name="start_date" value="{{ item.start_date.strftime('%Y-%m-%d') if item and item.start_date else '' }}">
</label><label>End Date
  <input type="date" name="end_date" value="{{ item.end_date.strftime('%Y-%m-%d') if item and item.end_date else '' }}">
</label><label>Status
  <input type="text" name="status" value="{{ item.status if item else '' }}" required>
</label>
  <div class="form-actions">
    <button class="btn" type="submit">Save</button>
    <a class="btn secondary" href="{{ url_for('sites') }}">Cancel</a>
  </div>
</form>
{% endblock %}
